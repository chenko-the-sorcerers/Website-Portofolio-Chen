[build]
  publish = "."
  functions = "api"

[build.environment]
  NODE_VERSION = "18"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Page rewrites

[[redirects]]
  from = "/projects"
  to   = "/pages/projects/index.html"
  status = 200

[[redirects]]
  from = "/projects/"
  to   = "/pages/projects/index.html"
  status = 200
